# reproducibility
seed_index: 0
deterministic: False

command: run # test or run

# PyTorch Lightning Trainer https://pytorch-lightning.readthedocs.io/en/stable/common/trainer.html
trainer:
  fast_dev_run: False # Enable this for debug purposes
  accelerator: 'gpu'
  strategy: 'ddp'
  devices: 1 # 2
  accumulate_grad_batches: 4
  # overfit_batches: 3
  # limit_test_batches: 1
  precision: 16-mixed
  max_epochs: 25 # 500
  max_steps: 100000
  num_sanity_val_steps: 0
  gradient_clip_val: 10.0
  val_check_interval: 1.0 #1.0
  deterministic: ${train.deterministic}

restore:
  ckpt_or_run_path: null
  mode: null # null, finetune, hotstart, continue

monitor:
  metric: 'loss/val'
  mode: 'min'

callbacks:
  - _target_: lightning.pytorch.callbacks.EarlyStopping
    patience: 3
    verbose: False
    monitor: ${train.monitor.metric}
    mode: ${train.monitor.mode}

  - _target_: lightning.pytorch.callbacks.ModelCheckpoint
    save_top_k: 1
    verbose: False
    monitor: ${train.monitor.metric}
    mode: ${train.monitor.mode}

  - _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: "step"
    log_momentum: False

  - _target_: lightning.pytorch.callbacks.progress.tqdm_progress.TQDMProgressBar
    refresh_rate: 5

  - _target_: paladin.pl_modules.callbacks.CalibrationCallback

  - _target_: paladin.pl_modules.callbacks.TestMetricsCallback



logging:
  upload:
    run_files: true
    source: true

  logger:
    _target_: lightning.pytorch.loggers.WandbLogger

    project: ${core.project_name}
    entity: null
    log_model: ${..upload.run_files}
    mode: 'online'
    tags: ${core.tags}
    name: ${histstring:${nn.data.dataset.tasks}}_${sitestring:${nn.data.dataset.tasks}}_${taskstring:${nn.data.dataset.tasks}}

  wandb_watch:
    log: 'all'
    log_freq: 5
